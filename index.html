        .discussion-box { padding: 20px; margin-bottom: 20px; cursor: pointer;}

        button:hover:not(:disabled) { background: #d7ccc8; color: #3e2723; }
        button:disabled { opacity: 0.6; cursor: not-allowed; border: 1px solid #555; }
        
        button.selected { border: 2px solid var(--highlight); background: rgba(250, 204, 21, 0.2); }
        
        .btn-trigger { width: 100%; background: #5d4037; margin-top: 10px; }
        #questions-section { display: none; margin-top: 20px; }
        .question-block { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }

    /* Modal Styling */
.modal {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left: 0; top: 0;
    width: 100%; height: 100%; 
    background-color: rgba(0,0,0,0.8); /* Darken background */
    backdrop-filter: blur(5px);
}

.modal-content {
    background-color: #064e3b;
    margin: 5% auto;
    padding: 20px;
    border: var(--border);
    width: 80%;
    max-height: 80vh;
    overflow-y: auto; /* Scroll if many questions */
    border-radius: 20px;

.close-modal {
    color: var(--text-color);
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
}
    
    .media-container div {

        // --- TTS and Tap Logic ---
        
    function stripHtml(html) {
            return html.replace(/<[^>]*>/g, ' ');
        }

        
    function playSpeech(text) {
    // 1. Check if already speaking: If yes, cancel and resume music
    if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        if (userWantsMusic && ytPlayer) {
            ytPlayer.playVideo();
        }
        return;
    }

    // 2. Extract and Clean Text
    let rawText = typeof text === 'object' ? text[currentLang] : text;
    
    // FIX: Remove HTML tags only, preserve Filipino punctuation and structure
    let cleanText = stripHtml(rawText)
        .replace(/\[.*?\]/g, '') // Remove [bracketed annotations]
        .replace(/\s+/g, ' ')    // Collapse extra spaces
        .trim();

    if (!cleanText) return;
        
        if (ytPlayer && userWantsMusic) {
        ytPlayer.pauseVideo();
    }

    // 3. Setup Utterance
    const utterance = new SpeechSynthesisUtterance(cleanText);
    
    // 4. Voice & Accent Logic - FIXED for Filipino
    const voices = window.speechSynthesis.getVoices();
    
    if (currentLang === 'fil') {
        return;
        
    } else {
        // English settings
        const englishVoice = voices.find(voice => 
            voice.lang.includes('en-US') || 
            voice.lang.includes('en-GB')
        );
        if (englishVoice) {
            utterance.voice = englishVoice;
        }
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
    }

    utterance.volume = 1.0;

    // 5. Music Integration
    if (ytPlayer && userWantsMusic) {
        ytPlayer.pauseVideo();
    }

    // 6. Event Listeners
    utterance.onend = function() {
        if (userWantsMusic && ytPlayer) {
            ytPlayer.playVideo();
        }
    };

    utterance.onerror = function(event) {
        console.error("TTS Error:", event.error);
        if (userWantsMusic && ytPlayer) {
            ytPlayer.playVideo();
        }
    };

    // 7. Execute
    window.speechSynthesis.speak(utterance);
}

        }
        
        function handleTap(text) {
            tapCount++;
            if (tapCount === 1) {
                tapTimer = setTimeout(() => {
                    // Single Tap: Pause/Resume
                    if (window.speechSynthesis.paused) {
                        window.speechSynthesis.resume();
                    } else if (window.speechSynthesis.speaking) {
                        window.speechSynthesis.pause();
                    }
                    tapCount = 0;
                }, 300);
            } else {
                // Double Tap: Restart
                clearTimeout(tapTimer);
                window.speechSynthesis.cancel();
                playSpeech(text);
                tapCount = 0;
            }
        }

        function renderQuestions() {
            const qContainer = document.getElementById('questions-section');
            const slide = sessionSlides[currentIndex];
            qContainer.innerHTML = '';
            slide.questions.forEach((q, qIndex) => {
                const optionsText = q.options.map((opt, i) => `Option ${i + 1}: ${opt.t}`).join('. ');
                 const fullSpeechText = `${q.q}. ${optionsText}`;
                qContainer.innerHTML += `
                    <div class="question-block">
                    <p onclick="playSpeech('${fullSpeechText.replace(/'/g, "\\'")}')" style="cursor: pointer;">
                    <strong>Q${qIndex + 1}:</strong> ${q.q} 
                    <span style="font-size: 0.8rem; color: #a3e635; display: block;">(Tap to hear question)</span>
                    </p>
                        
                        <div class="options-grid">
                            ${q.options.map((opt, optIndex) => `
                                <button class="${q.answered && q.selectedIndex === optIndex ? 'selected' : ''}" 
                                        ${q.answered ? 'disabled' : ''} 
                                        onclick="checkAnswer(${qIndex}, ${optIndex})">${opt.t}</button>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        }

        function checkAnswer(qIdx, optIdx) {
            const slide = sessionSlides[currentIndex];
            const question = slide.questions[qIdx];
            question.answered = true;
            question.selectedIndex = optIdx;
            question.userCorrect = question.options[optIdx].c;
            alert(question.userCorrect ? "Correct!" : "Incorrect!");
            renderQuestions();
            updateScoreUI();
        }

        function calculateSectionScore() {
            const slide = sessionSlides[currentIndex];
            const correct = slide.questions.filter(q => q.userCorrect).length;
            return `${correct}/${slide.questions.length}`;
        }

        function calculateTotalScore() {
            let correct = 0; let total = 0;
            sessionSlides.forEach(s => s.questions.forEach(q => { total++; if(q.userCorrect) correct++; }));
            return `${correct}/${total}`;
        }

        function updateScoreUI() {
            const overall = document.getElementById('overall-score');
            const section = document.getElementById('section-score');
            if(overall) overall.innerText = calculateTotalScore();
            if(section) section.innerText = calculateSectionScore();
        }

        function toggleQuestions() {
    const modal = document.getElementById('questions-modal');
    const qSection = document.getElementById('questions-section');
    
    if (modal.style.display === 'block') {
        modal.style.display = 'none';
    } else {
        modal.style.display = 'block';
        qSection.style.display = 'block'; // Ensure internal container is visible
    }
}

        function nextSlide() { 
            window.speechSynthesis.cancel();
            if(currentIndex < sessionSlides.length - 1) { currentIndex++; renderLesson(); } 
        }
        function prevSlide() { 
            window.speechSynthesis.cancel();
            if(currentIndex > 0) { currentIndex--; renderLesson(); } 
        }

        renderView('home');
    
    
    
    
    // --- YOUTUBE PLAYLIST & PLAYER CONFIGURATION ---
// You can add as many YouTube Video IDs in this array as you'd like
const musicPlaylist = [
    'UAQ3XLvu4gc', // Example Video ID 1
    'oMIpcfurG1Q', // Example Video ID 2
    'G-x-UwXccEw'  // Example Video ID 3
];

let ytPlayer;
let currentTrackIndex = 0;
let userWantsMusic = false; // Tracks if the user toggled music "On"

// Load the YouTube IFrame Player API asynchronously
(function() {
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
})();

// This function is automatically called by the YT API when ready
function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-background-player', {
        height: '0',
        width: '0',
        videoId: musicPlaylist[currentTrackIndex],
        events: {
            'onReady': onPlayerReady,
            'onStateChange': onPlayerStateChange
        }
    });
}

function onPlayerReady(event) {
    // Player is loaded and ready.
}

// Automatically loops/plays the next track when the current one ends
function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        currentTrackIndex = (currentTrackIndex + 1) % musicPlaylist.length;
        ytPlayer.loadVideoById(musicPlaylist[currentTrackIndex]);
    }
}

// Toggle play/pause music manually via the button
function toggleBackgroundMusic() {
    if (!ytPlayer) return;
    
    const btn = document.getElementById('music-toggle-btn');
    
    if (userWantsMusic) {
        // Pause the music
        ytPlayer.pauseVideo();
        userWantsMusic = false;
        if (btn) btn.innerHTML = 'PLAY'; // Play icon indicator
    } else {
        // Start playing
        ytPlayer.playVideo();
        userWantsMusic = true;
        if (btn) btn.innerHTML = 'PAUSE'; // Pause icon indicator
    }
}
